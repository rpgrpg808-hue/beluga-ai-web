<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beluga AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Markdown + kod vurgulama -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>
    <style>
        body { background-color: #131314; color: #e3e3e3; font-family: 'Inter', sans-serif; }
        .gemini-input { background-color: #1e1f20; border-radius: 28px; }
        .user-msg { background-color: #37393b; border-radius: 18px; padding: 12px 18px; white-space: pre-wrap; }
        .bot-msg { color: #e3e3e3; line-height: 1.7; }
        #chatBox::-webkit-scrollbar { width: 6px; }
        #chatBox::-webkit-scrollbar-thumb { background: #37393b; border-radius: 10px; }

        /* === Gemini tarzı renkli, dönen "Düşünüyor" animasyonu === */
        .thinking-wrap { display: flex; align-items: center; gap: 12px; padding: 8px 0; }
        .gemini-loader {
            width: 28px; height: 28px; border-radius: 50%; position: relative;
            background: conic-gradient(from 0deg, #4285F4 0deg, #9b72f7 90deg, #d96570 180deg, #f5b400 270deg, #4285F4 360deg);
            animation: gemini-spin 1.6s linear infinite;
            filter: drop-shadow(0 0 6px rgba(155,114,247,0.55)) drop-shadow(0 0 12px rgba(66,133,244,0.35));
        }
        .gemini-loader::after { content: ""; position: absolute; inset: 5px; background: #131314; border-radius: 50%; }
        .gemini-loader::before {
            content: ""; position: absolute; inset: -4px; border-radius: 50%;
            background: conic-gradient(from 180deg, rgba(66,133,244,0.6), rgba(217,101,112,0.6), rgba(245,180,0,0.6), rgba(66,133,244,0.6));
            filter: blur(8px); opacity: 0.7; animation: gemini-spin 2.4s linear infinite reverse; z-index: -1;
        }
        @keyframes gemini-spin { to { transform: rotate(360deg); } }
        .thinking-text {
            background: linear-gradient(90deg, #4285F4, #9b72f7, #d96570, #f5b400, #4285F4);
            background-size: 300% 100%; -webkit-background-clip: text; background-clip: text;
            color: transparent; font-weight: 500; animation: shimmer 2.4s linear infinite;
        }
        @keyframes shimmer { 0% { background-position: 0% 50%; } 100% { background-position: 300% 50%; } }

        /* === Gemini "Merhaba" gradyanı (canlı ve okunaklı) === */
        .greet-gradient {
            background: linear-gradient(90deg, #4285F4 0%, #9b72f7 45%, #d96570 80%, #f5b400 100%);
            -webkit-background-clip: text; background-clip: text; color: transparent;
            text-shadow: 0 0 30px rgba(155,114,247,0.15);
            font-weight: 700; letter-spacing: -0.5px;
        }

        /* === Markdown stilleri === */
        .md h1, .md h2, .md h3 { font-weight: 600; margin: 0.8em 0 0.4em; }
        .md h1 { font-size: 1.5rem; } .md h2 { font-size: 1.3rem; } .md h3 { font-size: 1.15rem; }
        .md p { margin: 0.5em 0; }
        .md ul, .md ol { margin: 0.5em 0; padding-left: 1.5em; }
        .md ul { list-style: disc; } .md ol { list-style: decimal; }
        .md li { margin: 0.2em 0; }
        .md a { color: #8ab4f8; text-decoration: underline; }
        .md blockquote { border-left: 3px solid #4285F4; padding: 0.2em 0.8em; margin: 0.6em 0; color: #b8b8b8; background: #1a1a1c; border-radius: 4px; }
        .md table { border-collapse: collapse; margin: 0.6em 0; }
        .md th, .md td { border: 1px solid #37393b; padding: 6px 10px; }
        .md th { background: #1e1f20; }
        .md code:not(pre code) {
            background: #1e1f20; padding: 2px 6px; border-radius: 4px;
            font-family: 'Fira Code', Consolas, monospace; font-size: 0.9em; color: #f5b400;
        }

        /* === Kod blokları + Kopyala butonu === */
        .code-wrap {
            position: relative; margin: 0.8em 0; border-radius: 10px;
            background: #0d0d0e; border: 1px solid #2a2a2c; overflow: hidden;
        }
        .code-head {
            display: flex; justify-content: space-between; align-items: center;
            padding: 6px 12px; background: #1a1a1c; border-bottom: 1px solid #2a2a2c;
            font-size: 0.75rem; color: #8a8a8a; text-transform: lowercase;
        }
        .copy-btn {
            background: transparent; border: 1px solid #37393b; color: #e3e3e3;
            padding: 3px 10px; border-radius: 6px; font-size: 0.75rem; cursor: pointer;
            display: flex; align-items: center; gap: 5px; transition: all 0.2s;
        }
        .copy-btn:hover { background: #2a2a2c; border-color: #4285F4; }
        .copy-btn.copied { color: #4ade80; border-color: #4ade80; }
        .code-wrap pre { margin: 0; padding: 12px 14px; overflow-x: auto; }
        .code-wrap pre code {
            font-family: 'Fira Code', Consolas, monospace; font-size: 0.875rem;
            background: transparent !important; padding: 0 !important;
        }

        textarea#userInput { resize: none; max-height: 200px; min-height: 24px; }
    </style>
</head>
<body class="h-screen flex flex-col items-center justify-between p-4">

    <div class="w-full max-w-3xl flex justify-between items-center p-4">
        <h1 class="text-xl font-medium text-gray-400">Beluga <span class="text-xs bg-gray-800 px-2 py-1 rounded">PRO</span></h1>
        <button onclick="resetChat()" title="Sohbeti temizle" class="p-2 hover:bg-gray-800 rounded-full transition">🗑️</button>
    </div>

    <div id="chatBox" class="w-full max-w-3xl flex-1 overflow-y-auto px-4 space-y-6 flex flex-col">
        <div id="welcome" class="mt-20 text-center">
            <h2 id="greet" class="text-5xl greet-gradient">Merhaba</h2>
            <p class="text-gray-500 mt-4 text-lg">Sana bugün nasıl yardımcı olabilirim?</p>
        </div>
    </div>

    <div class="w-full max-w-3xl p-4 mb-4">
        <div class="gemini-input flex items-end p-2 px-4 shadow-lg">
            <textarea id="userInput" rows="1" placeholder="Beluga'ya sor... (Enter: gönder, Shift+Enter: yeni satır)" class="bg-transparent flex-1 outline-none p-3 text-white"></textarea>
            <button onclick="send()" id="sendBtn" class="p-3 bg-blue-600 hover:bg-blue-500 rounded-full transition ml-2 shrink-0">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
        <p class="text-[10px] text-center text-gray-600 mt-2">Beluga hata yapabilir, bilgileri kontrol etmeyi unutma.</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
